<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>嫁 VS 姑 バトル</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
body { background:#0d0620; display:flex; justify-content:center; min-height:100vh; align-items:flex-start; }

#game-root {
  position:relative; width:100%; max-width:480px;
  background:#1a0a2e; font-family:'Courier New',monospace;
  min-height:100vh;
}

#arena {
  position:relative; width:100%; height:240px; overflow:hidden;
}
#bg-svg { position:absolute; inset:0; width:100%; height:100%; }

.char {
  position:absolute; bottom:44px; width:56px;
  display:flex; flex-direction:column; align-items:center;
}
.char svg { overflow:visible; }
.char-label { font-size:9px; margin-top:-4px; }
#player .char-label { color:#ff99cc; }
#enemy .char-label { color:#99aaff; transform:scaleX(-1); }

/* HUD */
#hud {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 10px; background:#0d0620; border-bottom:1px solid #4a2080;
}
.hp-block { flex:1; }
.hp-label { font-size:10px; color:#aaa; margin-bottom:3px; }
.hp-bar-bg { height:12px; background:#2a1040; border-radius:6px; overflow:hidden; border:1px solid #4a2080; }
.hp-fill { height:100%; border-radius:6px; transition:width .15s; }
#player-hp-fill { background:linear-gradient(90deg,#ff6b9d,#ff3366); }
#enemy-hp-fill { background:linear-gradient(90deg,#6b9dff,#3366ff); }
#enemy-hp-block .hp-bar-bg { direction:rtl; }
.vs-badge { font-size:15px; font-weight:bold; color:#ffd700; padding:0 8px; flex-shrink:0; }

/* Gauge Row */
#gauge-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:3px 10px; background:#0a051a;
}
.gauge-wrap { flex:1; display:flex; flex-direction:column; gap:2px; }
.gauge-label { font-size:9px; color:#cc99ff; }
.gauge-bg { height:7px; background:#1a0a30; border-radius:4px; overflow:hidden; border:1px solid #4a2080; }
.gauge-fill { height:100%; border-radius:4px; transition:width .1s; }
#p-gauge-fill { background:linear-gradient(90deg,#ff8800,#ffdd00); }
#e-gauge-fill { background:linear-gradient(90deg,#ff8800,#ffdd00); float:right; }
.gauge-ready {
  color:#ffd700; font-size:9px; font-weight:bold;
  padding:0 6px; display:none;
  animation:blink .5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

#timer-bar {
  text-align:center; font-size:20px; font-weight:bold;
  color:#ffd700; padding:2px 0; background:#0d0620;
  letter-spacing:2px;
}
#scene-label {
  text-align:center; font-size:9px; color:#8866aa;
  padding:1px 0; background:#0a051a;
}

/* Controls */
#controls { background:#0d0620; padding:8px 10px; border-top:1px solid #4a2080; }
#joystick-area {
  position:relative; width:100%; height:72px; margin-bottom:7px;
  background:rgba(255,255,255,.03); border-radius:8px;
  border:1px solid rgba(255,255,255,.08);
  touch-action:none;
  display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,.2); font-size:11px;
}
#joystick-thumb {
  position:absolute; width:34px; height:34px;
  background:radial-gradient(circle,#9966ff,#6633cc);
  border-radius:50%; border:2px solid #cc99ff;
  pointer-events:none;
  transform:translate(-50%,-50%); display:none;
}
#btn-row { display:flex; gap:6px; }
.btn {
  flex:1; height:50px; border:none; border-radius:10px;
  font-size:12px; font-weight:bold; font-family:'Courier New',monospace;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  transition:transform .08s, opacity .08s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active { transform:scale(.92); opacity:.85; }
#btn-attack { background:linear-gradient(135deg,#ff3366,#cc0044); color:#fff; }
#btn-defend { background:linear-gradient(135deg,#3399ff,#0055cc); color:#fff; }
#btn-jump   { background:linear-gradient(135deg,#ffcc00,#ff8800); color:#1a0a2e; }
#btn-beam   { background:linear-gradient(135deg,#aa00ff,#ff00aa); color:#fff; opacity:.45; transition:opacity .3s,transform .08s; }
#btn-beam.ready { opacity:1; box-shadow:0 0 12px #ff00aa88; }
.btn-icon  { font-size:18px; }
.btn-label { font-size:9px; opacity:.85; }

/* Status */
#status-row {
  display:flex; gap:5px; padding:3px 10px;
  background:#0d0620; min-height:22px;
  align-items:center; flex-wrap:wrap; overflow:hidden;
}
.status-tag { font-size:9px; padding:2px 6px; border-radius:10px; color:#fff; white-space:nowrap; }

/* Overlay */
#msg-overlay {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(10,5,20,.85); gap:12px;
}
#msg-title { font-size:24px; font-weight:bold; color:#ffd700; text-shadow:0 0 12px #ffa500; text-align:center; }
#msg-sub   { font-size:12px; color:#cc99ff; text-align:center; padding:0 20px; }
#btn-start {
  padding:10px 28px;
  background:linear-gradient(135deg,#9966ff,#6633cc);
  color:#fff; border:2px solid #cc99ff;
  border-radius:20px; font-size:15px; font-weight:bold;
  font-family:'Courier New',monospace; cursor:pointer;
}

/* VFX */
.beam-vfx {
  position:absolute; pointer-events:none;
  height:20px; border-radius:10px;
  top:50%; transform:translateY(-50%);
  animation:beamfly .4s ease-out forwards;
}
@keyframes beamfly {
  0%  { opacity:1; width:0; }
  50% { opacity:1; width:200px; }
  100%{ opacity:0; width:200px; }
}
.hit-vfx {
  position:absolute; font-size:22px; pointer-events:none;
  animation:hitpop .55s ease-out forwards;
}
@keyframes hitpop {
  0%  { opacity:1; transform:scale(.5) translateY(0); }
  60% { opacity:1; transform:scale(1.4) translateY(-18px); }
  100%{ opacity:0; transform:scale(1) translateY(-40px); }
}
</style>
</head>

// ━━━━━━━━━━━━━━━━━━━━━━━━━━
//  GAME STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━
let gameActive = false, gameOver = false;
let timer = 60, timerInterval = null;
let joystickActive = false, joystickOriginX = 0, joystickDx = 0;
let lastTime = 0;
let currentScene = 0;

const player = {
  el: null, x: 60, y: 0, vy: 0,
  hp: 100, maxHp: 100, gauge: 0,
  defending: false, jumping: false,
  attackCooldown: 0, stunned: 0
};
const enemy = {
  el: null, x: 300, y: 0, vy: 0,
  hp: 100, maxHp: 100, gauge: 0,
  defending: false, jumping: false,
  attackCooldown: 0, stunned: 0,
  aiTimer: 0, aiState: 'approach'
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━
//  DOM HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━
const $id = id => document.getElementById(id);

function setHp(who, val) {
  const c = who === 'player' ? player : enemy;
  c.hp = Math.max(0, Math.min(c.maxHp, val));
  $id(who === 'player' ? 'player-hp-fill' : 'enemy-hp-fill').style.width = (c.hp / c.maxHp * 100) + '%';
}

function setGauge(who, val) {
  const c = who === 'player' ? player : enemy;
  c.gauge = Math.max(0, Math.min(GAUGE_MAX, val));
  const pct = (c.gauge / GAUGE_MAX * 100).toFixed(1);
  $id(who === 'player' ? 'p-gauge-fill' : 'e-gauge-fill').style.width = pct + '%';
  const readyEl = $id(who === 'player' ? 'p-beam-ready' : 'e-beam-ready');
  readyEl.style.display = c.gauge >= GAUGE_MAX ? 'block' : 'none';
  if (who === 'player') $id('btn-beam').classList.toggle('ready', c.gauge >= GAUGE_MAX);
}

function showStatus(txt, color = '#666') {
  const tag = document.createElement('span');
  tag.className = 'status-tag';
  tag.style.background = color;
  tag.textContent = txt;
  $id('status-row').appendChild(tag);
  setTimeout(() => tag.remove(), 1800);
}

function spawnHit(x, y, txt) {
  const d = document.createElement('div');
  d.className = 'hit-vfx';
  d.style.cssText = `left:${x}px;top:${y}px`;
  d.textContent = txt;
  $id('arena').appendChild(d);
  setTimeout(() => d.remove(), 600);
}

function spawnBeam(fromX, toRight, grad) {
  const d = document.createElement('div');
  d.className = 'beam-vfx';
  d.style.cssText = `background:${grad};left:${fromX}px;` + (!toRight ? 'transform:translateY(-50%) scaleX(-1);' : '');
  $id('arena').appendChild(d);
  setTimeout(() => d.remove(), 450);
}

function renderPositions() {
  const arenaPx = $id('arena').clientWidth || ARENA_W;
  const s = arenaPx / ARENA_W;
  player.el.style.cssText = `left:${player.x * s}px;bottom:${FLOOR_Y + player.y}px;` +
    (player.defending ? 'filter:drop-shadow(0 0 7px #3399ff)' : '');
  enemy.el.style.cssText = `left:${enemy.x * s}px;bottom:${FLOOR_Y + enemy.y}px;transform:scaleX(-1);` +
    (enemy.defending ? 'filter:drop-shadow(0 0 7px #3399ff) scaleX(-1)' : '');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━
//  GAME LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━
function doAttack(who) {
  const atk = who === 'player' ? player : enemy;
  const def = who === 'player' ? enemy : player;
  const defWho = who === 'player' ? 'enemy' : 'player';
  if (atk.attackCooldown > 0 || atk.stunned > 0) return;
  const dist = Math.abs(atk.x - def.x);
  if (dist > ATTACK_RANGE) { showStatus('空振り💨', '#555'); return; }
  atk.attackCooldown = ATTACK_CD;
  const s = ($id('arena').clientWidth || ARENA_W) / ARENA_W;

  if (def.defending) {
    atk.stunned = 22;
    spawnHit(def.x * s, 55, '🛡️');
    showStatus('ガード！🛡️', '#1155cc');
    return;
  }
  const dmg = PUNCH_DMG + Math.floor(Math.random() * 4);
  setHp(defWho, def.hp - dmg);
  setGauge(who, atk.gauge + GAUGE_PER_HIT);
  spawnHit(def.x * s, 50, ['👊','💢','😤','✊'][Math.floor(Math.random() * 4)]);
  showStatus(`💥 -${dmg}HP`, who === 'player' ? '#cc1144' : '#1144cc');
  checkWin();
}

function doBeam(who) {
  const atk = who === 'player' ? player : enemy;
  const def = who === 'player' ? enemy : player;
  const defWho = who === 'player' ? 'enemy' : 'player';
  if (atk.gauge < GAUGE_MAX) return;
  atk.gauge = 0;
  setGauge(who, 0);
  const s = ($id('arena').clientWidth || ARENA_W) / ARENA_W;
  const toRight = atk.x < def.x;
  const grad = who === 'player'
    ? 'linear-gradient(90deg,#ff00aa,#ffaa00,#ff00aa)'
    : 'linear-gradient(90deg,#00aaff,#aa00ff,#00aaff)';
  spawnBeam(atk.x * s, toRight, grad);
  if (def.defending) {
    atk.stunned = 35;
    spawnHit(atk.x * s, 60, '✨');
    showStatus('ビームガード！✨', '#7700cc');
    return;
  }
  const dmg = BEAM_DMG + Math.floor(Math.random() * 6);
  setHp(defWho, def.hp - dmg);
  spawnHit(def.x * s, 40, '⚡💥⚡');
  showStatus(who === 'player' ? `⚡ 必殺ビーム！ -${dmg}HP!` : `👵⚡ 姑ビーム！ -${dmg}HP!`, '#8800cc');
  checkWin();
}

function doJump(who) {
  const c = who === 'player' ? player : enemy;
  if (!c.jumping && c.y === 0) { c.vy = JUMP_V; c.jumping = true; }
}

function physicsStep() {
  for (const c of [player, enemy]) {
    if (c.y > 0) {
      c.vy -= GRAVITY;
      c.y += c.vy;
      if (c.y <= 0) { c.y = 0; c.vy = 0; c.jumping = false; }
    }
    if (c.attackCooldown > 0) c.attackCooldown--;
    if (c.stunned > 0) c.stunned--;
  }
}

function enemyAI() {
  if (!gameActive || enemy.stunned > 0) return;
  const dist = enemy.x - player.x;
  const absDist = Math.abs(dist);
  enemy.aiTimer--;
  if (enemy.aiTimer > 0) return;
  enemy.defending = false;

  const r = Math.random();
  if (absDist > 88) {
    enemy.aiState = 'approach';
  } else if (enemy.gauge >= GAUGE_MAX && r < 0.55) {
    enemy.aiState = 'beam';
  } else if (r < 0.35) {
    enemy.aiState = 'attack';
  } else if (r < 0.52) {
    enemy.aiState = 'defend';
  } else if (r < 0.62) {
    enemy.aiState = 'jump';
  } else {
    enemy.aiState = 'retreat';
  }
  enemy.aiTimer = 10 + Math.floor(Math.random() * 18);

  if (enemy.aiState === 'approach' || enemy.aiState === 'retreat') {
    const dir = enemy.aiState === 'approach' ? (dist > 0 ? -1 : 1) : (dist > 0 ? 1 : -1);
    enemy.x = Math.max(10, Math.min(ARENA_W - CHAR_W, enemy.x + dir * MOVE_SPEED * 1.15));
  } else if (enemy.aiState === 'attack') {
    doAttack('enemy');
  } else if (enemy.aiState === 'defend') {
    enemy.defending = true;
    setTimeout(() => { if (gameActive) enemy.defending = false; }, 550);
  } else if (enemy.aiState === 'jump') {
    doJump('enemy');
  } else if (enemy.aiState === 'beam') {
    doBeam('enemy');
  }
}

function checkWin() {
  if (player.hp <= 0 || enemy.hp <= 0 || timer <= 0) endGame();
}

function endGame() {
  gameActive = false; gameOver = true;
  clearInterval(timerInterval);
  let result, sub;
  if (player.hp <= 0 && enemy.hp > 0) {
    result = '😭 姑の勝利！';
    sub = '旦那がおどおどしてます…リベンジ！';
  } else if (enemy.hp <= 0) {
    result = '🎉 嫁の大勝利！';
    sub = '旦那がほっとした顔をしています😅';
  } else {
    result = player.hp > enemy.hp ? '🏆 嫁の判定勝ち！' : '👵 姑の判定勝ち…';
    sub = '時間切れ！旦那はまだおどおどしてます。';
  }
  $id('msg-title').textContent = result;
  $id('msg-sub').textContent = sub;
  $id('btn-start').textContent = 'もう一度！';
  $id('msg-overlay').style.display = 'flex';
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━
//  START / LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━
function startGame() {
  currentScene = Math.floor(Math.random() * SCENES.length);
  SCENES[currentScene].render($id('bg-svg'));
  $id('scene-label').textContent = SCENES[currentScene].label;

  Object.assign(player, { x:60, y:0, vy:0, hp:100, gauge:0, defending:false, jumping:false, attackCooldown:0, stunned:0 });
  Object.assign(enemy, { x:300, y:0, vy:0, hp:100, gauge:0, defending:false, jumping:false, attackCooldown:0, stunned:0, aiTimer:30, aiState:'approach' });

  setHp('player', 100); setHp('enemy', 100);
  setGauge('player', 0); setGauge('enemy', 0);
  timer = 60;
  $id('timer-bar').textContent = '60';
  $id('timer-bar').style.color = '#ffd700';
  $id('status-row').innerHTML = '';
  $id('btn-beam').classList.remove('ready');
  gameOver = false; gameActive = true;
  $id('msg-overlay').style.display = 'none';

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timer--;
    $id('timer-bar').textContent = timer;
    $id('timer-bar').style.color = timer <= 10 ? '#ff4444' : '#ffd700';
    if (timer <= 0) checkWin();
  }, 1000);

  lastTime = 0;
  requestAnimationFrame(gameLoop);
}

function gameLoop(ts) {
  if (!gameActive) return;
  if (ts - lastTime < 16) { requestAnimationFrame(gameLoop); return; }
  lastTime = ts;
  if (joystickActive && !player.stunned) {
    const speed = (joystickDx / 60) * MOVE_SPEED * 3;
    player.x = Math.max(10, Math.min(ARENA_W - CHAR_W - 10, player.x + speed));
  }
  physicsStep();
  enemyAI();
  renderPositions();
  requestAnimationFrame(gameLoop);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━
//  INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━
function init() {
  player.el = $id('player');
  enemy.el  = $id('enemy');

  // Start button
  $id('btn-start').addEventListener('click', startGame);

  // Attack
  $id('btn-attack').addEventListener('touchstart', e => { e.preventDefault(); if (gameActive) doAttack('player'); }, { passive: false });
  $id('btn-attack').addEventListener('mousedown', () => { if (gameActive) doAttack('player'); });

  // Defend
  $id('btn-defend').addEventListener('touchstart', e => { e.preventDefault(); player.defending = true; }, { passive: false });
  $id('btn-defend').addEventListener('touchend',   e => { e.preventDefault(); player.defending = false; }, { passive: false });
  $id('btn-defend').addEventListener('mousedown', () => player.defending = true);
  $id('btn-defend').addEventListener('mouseup',   () => player.defending = false);

  // Jump
  $id('btn-jump').addEventListener('touchstart', e => { e.preventDefault(); doJump('player'); }, { passive: false });
  $id('btn-jump').addEventListener('mousedown', () => doJump('player'));

  // Beam
  $id('btn-beam').addEventListener('touchstart', e => { e.preventDefault(); if (gameActive) doBeam('player'); }, { passive: false });
  $id('btn-beam').addEventListener('mousedown', () => { if (gameActive) doBeam('player'); });

  // Joystick
  const area  = $id('joystick-area');
  const thumb = $id('joystick-thumb');
  function jStart(cx, cy) {
    const r = area.getBoundingClientRect();
    joystickOriginX = cx; joystickActive = true; joystickDx = 0;
    thumb.style.display = 'block';
    thumb.style.left = (cx - r.left) + 'px';
    thumb.style.top  = Math.max(18, Math.min(r.height - 18, cy - r.top)) + 'px';
  }
  function jMove(cx, cy) {
    if (!joystickActive) return;
    const r = area.getBoundingClientRect();
    joystickDx = Math.max(-60, Math.min(60, cx - joystickOriginX));
    thumb.style.left = Math.max(18, Math.min(r.width - 18, cx - r.left)) + 'px';
    thumb.style.top  = Math.max(18, Math.min(r.height - 18, cy - r.top)) + 'px';
  }
  function jEnd() { joystickActive = false; joystickDx = 0; thumb.style.display = 'none'; }

  area.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; jStart(t.clientX, t.clientY); }, { passive: false });
  area.addEventListener('touchmove',  e => { e.preventDefault(); const t = e.touches[0]; jMove(t.clientX, t.clientY); }, { passive: false });
  area.addEventListener('touchend',   e => { e.preventDefault(); jEnd(); }, { passive: false });
  area.addEventListener('mousedown',  e => jStart(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => jMove(e.clientX, e.clientY));
  window.addEventListener('mouseup',   () => { if (joystickActive) jEnd(); });

  renderPositions();
}

init();
</script>
